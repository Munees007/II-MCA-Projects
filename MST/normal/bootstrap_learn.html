<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="p-0">
    <!-- nav bar -->
     <div class="border-top border-bottom border-black container-fluid d-flex justify-content-between align-items-center" style="height: 50px;">
        <p class="mb-0">Dashboard</p>
        <button class="btn btn-outline-dark btn-sm rounded-circle w-10 h-10">+</button>
    </div>
    <!-- other area -->
     <div class="row container-fluid g-0">
        <!-- side bar -->
        <div class="col-2 border-black border-end vh-100">
            <div class="mt-2 p-2">
                <p class="card p-1" style="cursor: pointer;">Home</p>
                <div class="ms-3">
                    <p class="border-start border-2 ps-2">Personal</p>
                    <p class="border-start border-2 ps-2">Career</p>
                    <p class="border-start border-2 ps-2">Contact</p>
                </div>
            </div>
        </div>
        <!-- content side -->
        <div class="col p-3">
                <div class="row g-0 gap-2 mt-2">
                    <div class="card p-2 col">
                        <p>Hello</p>
                    </div>
                    <div class="card col p-2">
                        <p>Hello</p>
                    </div>
                </div>

                <div class="mt-3">
                    <table class="table table-hover table-bordered table-striped">
                        <thead >
                            <th>S.No</th>
                            <th>Roll No</th>
                            <th>Name</th>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>25PCA139</td>
                                <td>Muneeswaran</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>25PCA137</td>
                                <td>karthik Balan</td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>25PCA160</td>
                                <td>Sudharsan</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
        </div>
     </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
