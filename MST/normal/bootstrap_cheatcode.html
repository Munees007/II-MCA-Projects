<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Practice</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Custom height because Bootstrap has limited height utilities */
    .main-height {
      height: calc(100vh - 50px); /* full screen minus navbar height */
    }

    .sidebar-link {
      cursor: pointer;
    }
  </style>
</head>

<body class="p-0">

  <!-- NAVBAR -->
  <!-- container-fluid = full width, d-flex = flexbox -->
  <!-- justify-content-between = left and right space -->
  <!-- align-items-center = vertical center -->
  <div class="container-fluid border-top border-bottom border-black d-flex justify-content-between align-items-center px-3" style="height: 50px;">
    <p class="mb-0 fw-semibold">Dashboard</p>

    <!-- Bootstrap does not have w-10/h-10, so use custom style -->
    <button class="btn btn-outline-dark btn-sm rounded-circle d-flex align-items-center justify-content-center"
            style="width:32px;height:32px;">
      +
    </button>
  </div>

  <!-- MAIN BODY -->
  <!-- container-fluid p-0 = full width without default padding -->
  <div class="container-fluid p-0">
    <!-- row g-0 = Bootstrap grid row with no gutter gap -->
    <div class="row g-0 main-height">

      <!-- SIDEBAR -->
      <!-- col-2 = 2/12 width -->
      <div class="col-2 border-end border-black p-2 overflow-auto">

        <!-- card = Bootstrap box style -->
        <div class="card p-2 mb-3 sidebar-link">
          Home
        </div>

        <!-- ms-3 = margin-start/left -->
        <div class="ms-3">
          <p class="border-start border-2 ps-2 mb-3 sidebar-link">Personal</p>
          <p class="border-start border-2 ps-2 mb-3 sidebar-link">Career</p>
          <p class="border-start border-2 ps-2 mb-3 sidebar-link">Contact</p>
        </div>
      </div>

      <!-- CONTENT -->
      <!-- col = take remaining available width -->
      <div class="col p-3 overflow-auto">

        <!-- TOP CARDS -->
        <!-- row g-2 = grid row with small gap -->
        <div class="row g-2 mb-3">

          <!-- col-12 mobile full, col-md-6 half on medium screen -->
          <div class="col-12 col-md-6">
            <div class="card p-3 shadow-sm">
              <p class="mb-1 text-muted">Total Students</p>
              <h4 class="mb-0">3</h4>
            </div>
          </div>

          <div class="col-12 col-md-6">
            <div class="card p-3 shadow-sm">
              <p class="mb-1 text-muted">Department</p>
              <h4 class="mb-0">MCA</h4>
            </div>
          </div>

        </div>

        <!-- SEARCH + BUTTON AREA -->
        <!-- d-flex + gap-2 = flex row with spacing -->
        <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
          <input type="text" class="form-control" placeholder="Search student..." />

          <button class="btn btn-primary">
            Add
          </button>
        </div>

        <!-- TABLE -->
        <!-- table-responsive = horizontal scroll on small screens -->
        <div class="table-responsive">
          <table class="table table-hover table-bordered table-striped align-middle">

            <!-- Always put tr inside thead -->
            <thead class="table-dark">
              <tr>
                <th>S.No</th>
                <th>Roll No</th>
                <th>Name</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>1</td>
                <td>25PCA139</td>
                <td>Muneeswaran</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Edit</button>
                  <button class="btn btn-sm btn-outline-danger">Delete</button>
                </td>
              </tr>

              <tr>
                <td>2</td>
                <td>25PCA137</td>
                <td>Karthik Balan</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Edit</button>
                  <button class="btn btn-sm btn-outline-danger">Delete</button>
                </td>
              </tr>

              <tr>
                <td>3</td>
                <td>25PCA160</td>
                <td>Sudharsan</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Edit</button>
                  <button class="btn btn-sm btn-outline-danger">Delete</button>
                </td>
              </tr>
            </tbody>

          </table>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
